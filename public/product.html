<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Product - LUXORA</title>

<link rel="stylesheet" href="landing-page.css">

</head>

<body>

<header class="navbar">

  <h2 class="logo">LUXORA</h2>

  <nav>
    <a href="landing-page.html">Home</a>
    <a href="cart.html">Cart 🛍</a>
  </nav>

</header>

<section class="products">

  <h2>Product Details</h2>

  <div class="product-detail">

    <img id="product-image">

    <div class="product-info">

      <h3 id="product-name"></h3>

      <p class="price" id="product-price"></p>

      <button class="add-cart" id="add-cart-btn">Add to Cart</button>

    </div>

  </div>

</section>

<script>

  // ✅ FIXED: was crashing if no product in localStorage (no null check)
  const product = JSON.parse(localStorage.getItem("selectedProduct"));

  if(!product){
    window.location.href = "landing-page.html";
  } else {

    document.getElementById("product-name").textContent  = product.name;
    document.getElementById("product-price").textContent = product.price;
    document.getElementById("product-image").src         = product.image;

    // ✅ FIXED: Add to Cart button was doing nothing — now actually adds to cart
    document.getElementById("add-cart-btn").addEventListener("click", function(){

      let cart = JSON.parse(localStorage.getItem("luxoraCart")) || [];

      const existing = cart.find(i => i.name === product.name);
      if(existing){
        existing.quantity = (existing.quantity || 1) + 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }

      localStorage.setItem("luxoraCart", JSON.stringify(cart));

      alert(product.name + " added to cart!");

    });

  }

</script>

</body>
</html>
